# Yak package manifest for FrameCore Grasshopper plug-in.
# Build: yak build .   (run inside this directory after building FrameCore.Gh.csproj Release)
# Publish: yak push framecore-2.0.0-rh8_0-any.yak

---
name: framecore
version: 2.0.0
authors:
  - rocky59487
description: |
  FrameCore is a 3D elastic finite-element analysis engine with progressive collapse driver,
  MITC4 flat-shell elements, supernodal direct solver, and a long-term stable Rhino bridge
  with two profiles:
    * SIMPLE   — UE5-friendly drop-in; sensible defaults fill missing options.
    * ADVANCED — strict; no silent fallbacks; per-result diagnostics; Karamba3D-grade traceability.

  Ships 80+ Grasshopper components across 11 tabs (Setup / Material / Section / Geometry /
  Boundary / Load / Analyze / Inspect / Display / Advanced / IO), an 11-material default
  library (S235/S355/Q235/Q345/A36/A572 Gr50/C30/C50/Al6061/SPF), an 80+ section library
  (GB H-section, EU IPE/HEA/HEB, US W-shape, Box/Pipe/Channel/Angle), and a viewport-integrated
  Display set (BMD/SFD/NFD/UtilizationFringe/DeformedShape/ModeAnimation/CollapseReplay/
  FragmentVisualizer).

url: https://github.com/rocky59487/architect-
icon: Resources/Icons/framecore-yak-icon.png
keywords:
  - structure
  - fea
  - finite element
  - beam
  - shell
  - mitc4
  - progressive collapse
  - supernodal
  - karamba
  - bridge

# Rhino 8 (the lowest version we test against). The .gha targets net48 so it loads in 7 too,
# but several features (Inspector WPF panel, async preview) require Rhino 8's CLR.
requires:
  rhino_version: "8.0"

# Multi-target tag: rh8_0-any means "Rhino 8.0+, any platform".
# At publish time `yak build` infers this from the bin/Release/net48/ output.
